name: Go

on: [pull_request]

jobs:
  build:
    name: Run go tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '>=1.24.0'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
