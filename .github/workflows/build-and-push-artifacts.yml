name: build-and-push-to-artifact-registry

on:
  push:

env:
  PROJECT_NUM: ${{ secrets.PROJECT_NUM }}
  ARTIFACT_REGISTRY_LOCATION: ${{ secrets.ARTIFACT_REGISTRY_LOCATION }}
  IMAGE_REPO: ${{ secrets.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ secrets.GKE_PROJECT }}/${{ secrets.ARTIFACT_REPOSITORY }}
  DOCKER_BUILDKIT: 1

jobs:
  build-test:
    name: Run go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.25.0'

      - name: Test
        run: go test -v ./...
  build:
    name: Build nfd-coredns
    needs: build-test
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Configure Workload Identity Federation and generate an access token.
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/${{ env.PROJECT_NUM }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL }}/providers/${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      # Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Docker configuration
        run: |-
          echo ${{steps.auth.outputs.access_token}} | docker login -u oauth2accesstoken --password-stdin https://$ARTIFACT_REGISTRY_LOCATION-docker.pkg.dev

      - name: Build nfd-coredns
        run: docker buildx build --platform linux/amd64 -t $IMAGE_REPO/nfddns:$GITHUB_SHA .
      - name: Publish all
        run: |-
          docker push $IMAGE_REPO/nfddns:$GITHUB_SHA
          echo "::notice ::Built and Pushed $GITHUB_SHA"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.ref_name == 'main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push to DockerHub
        if: github.ref_name == 'main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            txnlab/nfd-dns:${{ github.sha }}
            txnlab/nfd-dns:latest


  push-to-env:
    name: Push hash to env repo
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Push hash to environment repo to start deploy process [if main]
        if: ${{ github.ref_name == 'main' }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_ENV_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '${{ secrets.DEPLOY_REPO_OWNER }}',
              repo: '${{ secrets.DEPLOY_REPO_NAME }}',
              workflow_id: '${{ secrets.DEPLOY_WORKFLOW_ID }}',
              ref: '${{ secrets.DEPLOY_REF }}',
              inputs: {'hash':'${{ github.sha }}'}
            });
